setup:
  addons:
  - plan: heroku-postgresql:hobby-dev
build:
  docker:
    web: Dockerfile
  config:
    POSTGRESQL_URL: $DATABASE_URL
    BCRYPT_SALT: 10
release:
  command:
    - cd server
    - npm run db:init
  image: web
  config:
    POSTGRESQL_URL: $DATABASE_URL
    BCRYPT_SALT: 10
run:
  web: node server/dist/main
